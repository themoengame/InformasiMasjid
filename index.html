<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Masjid - Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="loader" class="fixed inset-0 bg-white z-[100] flex items-center justify-center transition-opacity duration-500">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-emerald-800 font-semibold tracking-wide">Menghubungkan ke Google Sheets...</p>
        </div>
    </div>

    <header class="hero-gradient text-white pb-32 pt-20 px-6">
        <div class="max-w-5xl mx-auto text-center">
            <span class="inline-block px-4 py-1 bg-emerald-500/30 rounded-full text-sm font-semibold mb-4 backdrop-blur-sm">Profil Resmi</span>
            <h1 id="nama_masjid" class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tight"></h1>
            <p id="tagline" class="text-xl md:text-2xl text-emerald-100 font-light italic"></p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 -mt-20">
        <div class="grid lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-8">
                <section class="bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-gray-200/50">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center text-xl">
                            <i class="fas fa-eye"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-wide">Visi</h2>
                    </div>
                    <p id="visi" class="text-xl leading-relaxed text-gray-600 italic border-l-4 border-emerald-500 pl-6"></p>
                </section>

                <section class="bg-white p-8 md:p-10 rounded-3xl shadow-xl shadow-gray-200/50">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-12 h-12 bg-emerald-100 text-emerald-700 rounded-2xl flex items-center justify-center text-xl">
                            <i class="fas fa-bullseye"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-wide">Misi</h2>
                    </div>
                    <div id="misi" class="text-lg leading-loose text-gray-600 whitespace-pre-line space-y-2"></div>
                </section>
            </div>

            <div class="space-y-8">
                <div class="bg-gray-900 text-white p-8 rounded-3xl shadow-2xl">
                    <h3 class="text-xl font-bold mb-6 border-b border-gray-700 pb-4">Kontak & Lokasi</h3>
                    <div class="space-y-6">
                        <div class="flex items-start gap-4">
                            <i class="fas fa-map-marker-alt mt-1 text-emerald-400"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">Alamat</p>
                                <p id="alamat" class="text-sm leading-relaxed"></p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4">
                            <i class="fas fa-calendar-alt mt-1 text-emerald-400"></i>
                            <div>
                                <p class="text-xs text-gray-400 uppercase">Tahun Berdiri</p>
                                <p id="tahun_berdiri" class="text-sm"></p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-8 pt-6 border-t border-gray-700 flex gap-4">
                        <a id="wa_btn" href="#" target="_blank" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl text-center transition font-bold">
                            <i class="fab fa-whatsapp mr-2"></i> WhatsApp
                        </a>
                    </div>
                </div>

                <div class="bg-emerald-50 p-8 rounded-3xl border border-emerald-100">
                    <h3 class="text-emerald-900 font-bold mb-4 flex items-center">
                        <i class="fas fa-mosque mr-2"></i> Fasilitas Utama
                    </h3>
                    <div id="fasilitas" class="text-emerald-800/80 italic leading-relaxed whitespace-pre-line text-sm bg-white/50 p-4 rounded-xl"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center text-gray-400 text-sm">
        <p>&copy; 2026 <span id="footer_nama" class="font-semibold"></span>. Semua data diambil dari Google Sheets secara real-time.</p>
    </footer>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTNjYH7HJ5Raf59LRfIiHQLMPWmFAiXUQqzrup4Tc6PuPxUQGyIAgcdBM5lWubSEhWgy3DIeU3P_Pq/pub?output=csv';

        async function init() {
            try {
                const response = await fetch(csvUrl);
                const rawData = await response.text();
                
                // Parser CSV yang lebih aman untuk multiline (misi/fasilitas)
                const rows = rawData.split(/\r?\n/);
                const profile = {};

                rows.forEach(row => {
                    // Split berdasarkan koma pertama saja (key, value)
                    const firstComma = row.indexOf(',');
                    if (firstComma !== -1) {
                        let key = row.substring(0, firstComma).trim();
                        let value = row.substring(firstComma + 1).trim();
                        
                        // Bersihkan tanda kutip ganda yang biasanya ada di CSV untuk data multiline
                        value = value.replace(/^"|"$/g, '').replace(/""/g, '"');
                        
                        if (key) profile[key] = value;
                    }
                });

                // Update Element
                document.title = profile.nama_masjid || "Profil Masjid";
                document.getElementById('nama_masjid').textContent = profile.nama_masjid;
                document.getElementById('footer_nama').textContent = profile.nama_masjid;
                document.getElementById('tagline').textContent = profile.tagline;
                document.getElementById('visi').textContent = profile.visi;
                document.getElementById('misi').textContent = profile.misi;
                document.getElementById('alamat').textContent = profile.alamat;
                document.getElementById('tahun_berdiri').textContent = profile.tahun_berdiri;
                document.getElementById('fasilitas').textContent = profile.fasilitas;
                
                // WhatsApp Link
                if(profile.wa_number) {
                    document.getElementById('wa_btn').href = `https://wa.me/${profile.wa_number.replace(/\D/g,'')}`;
                }

                // Sembunyikan Loader
                const loader = document.getElementById('loader');
                loader.classList.add('opacity-0');
                setTimeout(() => loader.style.display = 'none', 500);

            } catch (error) {
                console.error("Error:", error);
                alert("Gagal memuat data dari Google Sheets. Pastikan link sudah di-publish ke web.");
            }
        }

        init();
    </script>
</body>
</html>
