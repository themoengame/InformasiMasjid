<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Masjid - Debug Sheet Profil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8faf4; color: #1e2a2e; line-height: 1.5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .error-box { background: #fff3f3; border-left: 5px solid #d32f2f; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .error-box pre { background: #f1f1f1; padding: 12px; overflow-x: auto; border-radius: 8px; margin: 12px 0; }
        .instruction { background: #e8f0fe; border-left: 5px solid #1e6f4c; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .btn { background: #1e6f4c; color: white; padding: 10px 20px; border-radius: 40px; text-decoration: none; display: inline-block; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #1e6f4c; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-mosque"></i> Debug Google Sheet - Masjid</h1>
    <div id="debug-output">Memeriksa sheet profil...</div>
</div>

<script>
const SPREADSHEET_ID = '1dKHiVnVhCBziOeAh_rabPfaaL8mpgtiPYmft2OxVGYQ';

async function fetchRawCSV(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return await response.text();
}

function parseCSV(csvText) {
    const rows = [];
    let currentRow = [];
    let currentField = '';
    let inQuotes = false;
    let i = 0;
    while (i < csvText.length) {
        const ch = csvText[i];
        if (ch === '"') {
            if (inQuotes && csvText[i+1] === '"') { currentField += '"'; i += 2; continue; }
            inQuotes = !inQuotes;
            i++;
            continue;
        }
        if (ch === ',' && !inQuotes) {
            currentRow.push(currentField.trim());
            currentField = '';
            i++;
            continue;
        }
        if (ch === '\n' && !inQuotes) {
            currentRow.push(currentField.trim());
            if (currentRow.length > 0 && currentRow.some(c => c !== '')) rows.push(currentRow);
            currentRow = [];
            currentField = '';
            i++;
            continue;
        }
        currentField += ch;
        i++;
    }
    if (currentField !== '' || currentRow.length > 0) {
        currentRow.push(currentField.trim());
        if (currentRow.length > 0 && currentRow.some(c => c !== '')) rows.push(currentRow);
    }
    if (rows.length === 0) return [];
    const headers = rows[0];
    const data = [];
    for (let r = 1; r < rows.length; r++) {
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = rows[r][idx] || ''; });
        data.push(obj);
    }
    return data;
}

async function checkProfilSheet() {
    const outputDiv = document.getElementById('debug-output');
    outputDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengambil data sheet profil...';
    
    try {
        const rawCSV = await fetchRawCSV('profil');
        outputDiv.innerHTML = `<div class="error-box">
            <h3><i class="fas fa-file-csv"></i> Raw CSV dari sheet "profil":</h3>
            <pre>${escapeHtml(rawCSV.substring(0, 1000))}${rawCSV.length > 1000 ? '...' : ''}</pre>
            <p><strong>Panjang data:</strong> ${rawCSV.length} karakter</p>
        </div>`;
        
        // Parse CSV
        const parsed = parseCSV(rawCSV);
        console.log('Hasil parse:', parsed);
        
        if (parsed.length === 0) {
            outputDiv.innerHTML += `<div class="error-box"><h3>❌ Sheet profil kosong atau tidak bisa diparse.</h3></div>`;
            return;
        }
        
        const firstRow = parsed[0];
        const hasKeyValue = firstRow.hasOwnProperty('key') && firstRow.hasOwnProperty('value');
        
        if (!hasKeyValue) {
            outputDiv.innerHTML += `<div class="error-box">
                <h3>❌ Sheet profil TIDAK memiliki kolom "key" dan "value"</h3>
                <p>Kolom yang terdeteksi: <strong>${Object.keys(firstRow).join(', ')}</strong></p>
                <p>Baris pertama data: ${JSON.stringify(firstRow)}</p>
            </div>
            <div class="instruction">
                <h3><i class="fas fa-tools"></i> Cara Perbaiki Sheet "profil" (WAJIB IKUTI):</h3>
                <ol>
                    <li>Buka Google Spreadsheet Anda.</li>
                    <li>Klik sheet <strong>"profil"</strong>.</li>
                    <li><strong>Hapus SEMUA isi</strong> (pilih semua sel, tekan Delete).</li>
                    <li>Buat tabel dengan DUA KOLOM seperti di bawah ini, mulai dari sel A1:</li>
                </ol>
                <table>
                    <tr><th>key</th><th>value</th></tr>
                    <tr><td>nama_masjid</td><td>Masjid An-Nur</td></tr>
                    <tr><td>tagline</td><td>Rahmatan Lil 'Alamin</td></tr>
                    <tr><td>tahun_berdiri</td><td>1985 M / 1405 H</td></tr>
                    <tr><td>visi</td><td>Menjadi pusat peradaban Islam yang rahmatan lil 'alamin</td></tr>
                    <tr><td>misi</td><td>Mengoptimalkan ibadah dan kajian rutin<br>Memberdayakan ekonomi umat</td></tr>
                    <tr><td>alamat</td><td>Jl. Masjid No. 45, Kelurahan Sukamaju, Kota Bandung</td></tr>
                    <tr><td>wa_number</td><td>6281234567890</td></tr>
                    <tr><td>email</td><td>info@masjidannur.id</td></tr>
                    <tr><td>fasilitas</td><td>Ruang utama kapasitas 800 jamaah<br>Ruang wudhu & toilet bersih<br>Perpustakaan Islam</td></tr>
                </table>
                <p><strong>Catatan:</strong> Untuk baris baru dalam satu sel, gunakan <kbd>Alt + Enter</kbd> (Windows) atau <kbd>Option + Enter</kbd> (Mac).</p>
                <ol start="5">
                    <li>Setelah selesai, klik <strong>File → Share → Publish to web</strong>.</li>
                    <li>Pilih sheet <strong>"profil"</strong> → format <strong>CSV</strong> → klik <strong>Publish</strong>.</li>
                    <li>Klik tombol di bawah untuk memuat ulang halaman ini.</li>
                </ol>
                <button onclick="location.reload()" class="btn"><i class="fas fa-sync-alt"></i> Muat Ulang Halaman</button>
            </div>`;
            return;
        }
        
        // Jika berhasil, lanjutkan load semua data
        outputDiv.innerHTML = '<div class="instruction">✅ Sheet profil sudah benar! Memuat data lengkap...</div>';
        await loadFullWebsite(parsed);
        
    } catch (err) {
        outputDiv.innerHTML = `<div class="error-box"><h3>❌ Error: ${err.message}</h3><p>Pastikan sheet "profil" sudah dipublikasikan ke web (CSV).</p></div>`;
    }
}

async function loadFullWebsite(profilData) {
    // profilData adalah array of objects dengan key & value
    const profil = {};
    profilData.forEach(row => { profil[row.key] = row.value; });
    
    // Fetch sheet lain
    async function fetchSheet(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
        const resp = await fetch(url);
        const csv = await resp.text();
        return parseCSV(csv);
    }
    
    try {
        const [jadwalSholat, jadwalImam, jadwalMuadzin, kajian, pengurus, keuangan, galeri, hero, sosialMedia] = await Promise.all([
            fetchSheet('jadwal_sholat'), fetchSheet('jadwal_imam'), fetchSheet('jadwal_muadzin'),
            fetchSheet('kajian'), fetchSheet('pengurus'), fetchSheet('keuangan'),
            fetchSheet('galeri'), fetchSheet('hero'), fetchSheet('sosial_media')
        ]);
        
        // Render full HTML (sama seperti sebelumnya, tapi sederhana)
        const namaMasjid = profil.nama_masjid || 'Masjid An-Nur';
        const tagline = profil.tagline || '';
        const fasilitasList = (profil.fasilitas || '').split(/\r?\n/).filter(f => f.trim());
        const fasilitasHtml = fasilitasList.length ? `<ul>${fasilitasList.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>` : '<p>-</p>';
        
        let waNumber = (profil.wa_number || '').replace(/[^0-9]/g, '');
        if (waNumber.startsWith('0')) waNumber = '62' + waNumber.substring(1);
        const waLink = waNumber ? `https://wa.me/${waNumber}` : '#';
        
        const heroData = hero[0] || {};
        
        const fullHtml = `
        <style>
            /* reuse style dari sebelumnya, atau inline saja */
            body { font-family: 'Inter', sans-serif; background: #f8faf4; color: #1e2a2e; }
            .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
            header { background: linear-gradient(135deg, #0f3b2c, #1e6f4c); color: white; padding: 20px 0; position: sticky; top: 0; }
            .nav-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
            .logo h1 { font-size: 1.6rem; }
            .nav-links a { color: white; text-decoration: none; margin: 0 12px; }
            .hero { padding: 80px 20px; text-align: center; color: white; background: linear-gradient(rgba(15,59,44,0.85), rgba(30,111,76,0.85)), url('${escapeHtml(heroData.background_url || 'https://placehold.co/1600x600')}') center/cover; }
            .hero h2 { font-size: 2.8rem; }
            section { padding: 60px 0; border-bottom: 1px solid #e2e8e0; }
            .section-title { font-size: 2rem; text-align: center; color: #1e6f4c; margin-bottom: 40px; }
            .grid-2, .grid-3, .grid-4 { display: grid; gap: 30px; }
            .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
            .grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
            .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
            .schedule-table { width: 100%; border-collapse: collapse; background: white; }
            .schedule-table th, .schedule-table td { padding: 12px; border-bottom: 1px solid #e9ecef; }
            .schedule-table th { background: #1e6f4c; color: white; }
            .gallery-img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; }
            .wa-link { background: #25D366; color: white; padding: 10px 20px; border-radius: 40px; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; }
            footer { background: #0f3b2c; color: #ccc; padding: 32px 0; text-align: center; }
            @media (max-width: 768px) { .hero h2 { font-size: 2rem; } }
        </style>
        <header>
            <div class="container nav-container">
                <div class="logo"><h1><i class="fas fa-mosque"></i> ${escapeHtml(namaMasjid)}</h1><p>${escapeHtml(tagline)}</p></div>
                <div class="nav-links">
                    <a href="#profil">Profil</a><a href="#jadwal">Jadwal</a><a href="#imam">Imam</a>
                    <a href="#kajian">Kajian</a><a href="#galeri">Galeri</a><a href="#pengurus">Pengurus</a>
                    <a href="#keuangan">Keuangan</a><a href="#lokasi">Lokasi</a>
                </div>
            </div>
        </header>
        <div class="hero"><div class="container"><h2>${escapeHtml(heroData.judul || namaMasjid)}</h2><p>${escapeHtml(heroData.subjudul || tagline)}</p></div></div>
        <main class="container">
            <section id="profil"><h3 class="section-title">Profil Masjid</h3><div class="grid-2">
                <div class="card"><h3>Tahun Berdiri</h3><p>${escapeHtml(profil.tahun_berdiri || '-')}</p><h3>Visi</h3><p>${escapeHtml(profil.visi || '').replace(/\n/g, '<br>')}</p><h3>Misi</h3><p>${escapeHtml(profil.misi || '').replace(/\n/g, '<br>')}</p></div>
                <div class="card"><h3>Fasilitas</h3>${fasilitasHtml}</div>
            </div></section>
            <section id="jadwal"><h3 class="section-title">Jadwal Sholat</h3><div class="card"><table class="schedule-table"><thead><tr><th>Sholat</th><th>Waktu</th></tr></thead><tbody>${jadwalSholat.map(r => `<tr><td>${escapeHtml(r.sholat)}</td><td>${escapeHtml(r.waktu)}</td></tr>`).join('')}</tbody></table></div></section>
            <section id="imam"><h3 class="section-title">Imam & Muadzin</h3><div class="grid-2"><div class="card"><h3>Imam</h3><ul>${jadwalImam.map(i => `<li><strong>${escapeHtml(i.sholat)}</strong> : ${escapeHtml(i.nama_imam)}</li>`).join('')}</ul></div><div class="card"><h3>Muadzin</h3><ul>${jadwalMuadzin.map(m => `<li><strong>${escapeHtml(m.sholat)}</strong> : ${escapeHtml(m.nama_muadzin)}</li>`).join('')}</ul></div></div></section>
            <section id="kajian"><h3 class="section-title">Kajian Rutin</h3><div class="grid-3">${kajian.map(k => `<div class="card"><i class="fas ${k.icon || 'fa-calendar-alt'} fa-2x"></i><h3>${escapeHtml(k.judul)}</h3><p>${escapeHtml(k.deskripsi)}</p><a href="${escapeHtml(k.link)}" target="_blank" style="background:#f4c542; padding:8px 16px; border-radius:40px; text-decoration:none; display:inline-block;">Detail →</a></div>`).join('')}</div></section>
            <section id="galeri"><h3 class="section-title">Galeri</h3><div class="grid-4">${galeri.map(g => `<div><img src="${escapeHtml(g.url_gambar)}" class="gallery-img" loading="lazy"><p>${escapeHtml(g.judul)}</p></div>`).join('')}</div></section>
            <section id="pengurus"><h3 class="section-title">Pengurus</h3><div class="grid-3">${pengurus.map(p => `<div class="card" style="text-align:center">${p.foto_url ? `<img src="${escapeHtml(p.foto_url)}" style="width:100px;height:100px;border-radius:50%;">` : '<i class="fas fa-user-circle fa-3x"></i>'}<h3>${escapeHtml(p.jabatan)}</h3><p>${escapeHtml(p.nama)}</p></div>`).join('')}</div></section>
            <section id="keuangan"><h3 class="section-title">Keuangan</h3><div class="card">${keuangan.map(k => `<div><strong>${escapeHtml(k.bulan_tahun)}</strong></div><div>Pemasukan: Rp ${parseInt(k.pemasukan).toLocaleString()}</div><div>Pengeluaran: Rp ${parseInt(k.pengeluaran).toLocaleString()}</div><div><strong>Saldo: Rp ${parseInt(k.saldo).toLocaleString()}</strong></div>`).join('')}</div></section>
            <section id="lokasi"><h3 class="section-title">Lokasi & Kontak</h3><div class="grid-2"><div><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.712359129087!2d107.618889!3d-6.917222!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e68e7a3e5b5b3b3%3A0x5e5e5e5e5e5e5e5e!2sMasjid%20Raya!5e0!3m2!1sid!2sid!4v1680000000000!5m2!1sid!2sid" width="100%" height="300" style="border:0;" allowfullscreen></iframe></div><div class="card"><h3>Hubungi Kami</h3>${waNumber ? `<p><i class="fab fa-whatsapp"></i> <a href="${waLink}" target="_blank" class="wa-link">Chat Marbot</a></p>` : ''}<p><i class="fas fa-envelope"></i> ${escapeHtml(profil.email || '-')}</p><p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(profil.alamat || '-')}</p><div>${sosialMedia.map(sm => `<a href="${escapeHtml(sm.url)}" target="_blank" style="margin-right:16px; font-size:1.8rem; color:#1e6f4c;"><i class="fab fa-${sm.platform}"></i></a>`).join('')}</div></div></div></section>
        </main>
        <footer><div class="container"><p>© 2025 ${escapeHtml(namaMasjid)} | Data dari Google Sheet</p></div></footer>
        `;
        document.body.innerHTML = fullHtml;
    } catch(err) {
        document.getElementById('debug-output').innerHTML += `<div class="error-box">Gagal memuat data lain: ${err.message}</div>`;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

checkProfilSheet();
</script>
</body>
</html>
