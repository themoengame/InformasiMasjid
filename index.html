<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Memuat data masjid...</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Amiri&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .arabic-font { font-family: 'Amiri', serif; }
    .hero-gradient { background: linear-gradient(135deg, #0a2e38 0%, #0b4f3c 100%); }
    .gold-text { color: #eab308; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #eab308; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .fasilitas-item { padding-left: 1.5rem; position: relative; }
    .fasilitas-item:before { content: "•"; color: #eab308; position: absolute; left: 0; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Loading -->
  <div id="loading" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
    <div class="loading-spinner"></div>
    <p class="mt-4 text-gray-600">Mengambil data terbaru dari Google Sheet...</p>
  </div>

  <!-- Main content (sembunyikan sampai data siap) -->
  <div id="main" class="hidden opacity-0 transition-opacity duration-500">
    <header class="hero-gradient text-white relative">
      <div class="container mx-auto px-6 py-16 md:py-20 text-center md:text-left">
        <div class="md:flex md:justify-between md:items-center">
          <div>
            <div class="inline-block bg-white/20 rounded-full px-4 py-1 text-sm mb-4"><i class="fas fa-mosque mr-2"></i> <span id="hero-badge">Masjid</span></div>
            <h1 id="hero-nama" class="text-4xl md:text-6xl font-bold arabic-font">Masjid</h1>
            <p id="hero-tagline" class="text-xl text-emerald-100 italic mt-3 border-l-4 border-gold-text pl-4"></p>
            <div class="mt-6 flex gap-4 justify-center md:justify-start">
              <a href="#profil" class="bg-gold-text hover:bg-amber-500 text-gray-900 font-semibold px-6 py-2 rounded-full shadow-md flex items-center gap-2"><i class="fas fa-landmark"></i> Profil</a>
              <a href="#" id="wa-hero" target="_blank" class="bg-white/20 hover:bg-white/30 backdrop-blur-sm rounded-full px-6 py-2 flex items-center gap-2"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            </div>
          </div>
          <div class="hidden md:block w-32 h-32 bg-gold-text/20 rounded-full flex items-center justify-center"><i class="fas fa-moon text-6xl text-amber-300"></i></div>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-6 py-12" id="profil">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
        <div class="bg-white rounded-2xl shadow-lg p-6 border-b-4 border-gold-text">
          <div class="flex items-center gap-3 mb-4"><div class="bg-emerald-100 p-3 rounded-full"><i class="fas fa-eye text-emerald-700 text-xl"></i></div><h2 class="text-2xl font-bold">Visi</h2></div>
          <p id="visi-text" class="text-gray-700 text-lg italic"></p>
        </div>
        <div class="bg-white rounded-2xl shadow-lg p-6 border-b-4 border-gold-text">
          <div class="flex items-center gap-3 mb-4"><div class="bg-emerald-100 p-3 rounded-full"><i class="fas fa-bullhorn text-emerald-700 text-xl"></i></div><h2 class="text-2xl font-bold">Misi</h2></div>
          <div id="misi-list" class="space-y-2"></div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
        <div class="lg:col-span-2 bg-white rounded-2xl shadow-lg overflow-hidden">
          <div class="bg-emerald-800 px-6 py-4 text-white font-bold"><i class="fas fa-building mr-2"></i> Fasilitas</div>
          <div class="p-6"><div id="fasilitas-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div></div>
        </div>
        <div class="bg-gradient-to-br from-emerald-50 to-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-2 text-emerald-800 border-b pb-3 mb-4"><i class="fas fa-calendar-alt"></i><h2 class="text-xl font-bold">Tahun Berdiri</h2></div>
          <p id="tahun-berdiri" class="text-3xl font-bold text-emerald-700">--</p>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-3 mb-5"><div class="bg-red-100 p-2 rounded-full"><i class="fas fa-map-marker-alt text-red-600 text-xl"></i></div><h2 class="text-2xl font-bold">Lokasi</h2></div>
          <p id="alamat-text" class="text-gray-700 mb-4"></p>
          <a id="maps-link" href="#" target="_blank" class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 px-5 py-2 rounded-full"><i class="fab fa-google"></i> Buka Maps</a>
        </div>
        <div class="bg-white rounded-2xl shadow-lg p-6">
          <div class="flex items-center gap-3 mb-5"><div class="bg-green-100 p-2 rounded-full"><i class="fas fa-phone-alt text-green-700 text-xl"></i></div><h2 class="text-2xl font-bold">Kontak</h2></div>
          <div class="space-y-3">
            <div><i class="fab fa-whatsapp text-green-600 w-6"></i> <a id="wa-link" href="#" target="_blank" class="font-semibold hover:text-green-600"></a></div>
            <div><i class="fas fa-envelope text-amber-600 w-6"></i> <a id="email-link" href="#" class="font-semibold hover:text-emerald-600"></a></div>
          </div>
        </div>
      </div>

      <div class="text-center mt-12 pt-8 border-t border-gray-200">
        <p class="text-gray-500 italic">"Sebaik-baik manusia adalah yang bermanfaat bagi orang lain" — <span id="footer-nama"></span></p>
      </div>
    </main>

    <footer class="bg-gray-900 text-gray-300 py-6 text-center text-sm">
      <p>© <span id="tahun-dinamis"></span> <span id="footer-nama2"></span> | Data real-time dari Google Sheet</p>
    </footer>
  </div>

  <script>
    // ========== GUNAKAN URL CSV PUBLIK ANDA ==========
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTNjYH7HJ5Raf59LRfIiHQLMPWmFAiXUQqzrup4Tc6PuPxUQGyIAgcdBM5lWubSEhWgy3DIeU3P_Pq/pub?gid=0&single=true&output=csv';
    // Tambahkan timestamp untuk menghindari cache
    const fetchUrl = `${CSV_URL}&_=${Date.now()}`;

    async function loadData() {
      try {
        const response = await fetch(fetchUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        
        // Parsing CSV sederhana (asumsi kolom pertama key, kedua value)
        const lines = csvText.split(/\r?\n/).filter(line => line.trim().length > 0);
        if (lines.length === 0) throw new Error('CSV kosong');
        
        // Baris pertama mungkin header? Cek apakah baris pertama berisi 'key' dan 'value' (case insensitive)
        let startIndex = 0;
        const firstLine = lines[0].toLowerCase();
        if (firstLine.includes('key') && firstLine.includes('value')) {
          startIndex = 1; // lewati header
        }
        
        const dataMap = new Map();
        for (let i = startIndex; i < lines.length; i++) {
          // Pisahkan berdasarkan koma (sederhana, tidak menangani kutipan kompleks)
          let line = lines[i];
          // Cari koma pertama
          let commaIndex = line.indexOf(',');
          if (commaIndex === -1) continue;
          let key = line.substring(0, commaIndex).trim().toLowerCase();
          let value = line.substring(commaIndex + 1).trim();
          // Hapus kemungkinan tanda kutip di awal/akhir value
          if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
          dataMap.set(key, value);
        }
        
        // Ambil nilai (gunakan default hanya jika key tidak ditemukan, untuk mencegah error)
        const nama = dataMap.get('nama_masjid') || '';
        const tagline = dataMap.get('tagline') || '';
        const visi = dataMap.get('visi') || '';
        const misiRaw = dataMap.get('misi') || '';
        const tahun = dataMap.get('tahun_berdiri') || '';
        const alamat = dataMap.get('alamat') || '';
        const wa = dataMap.get('wa_number') || '';
        const email = dataMap.get('email') || '';
        const fasilitasRaw = dataMap.get('fasilitas') || '';
        
        // Validasi minimal data ada
        if (!nama) throw new Error('Key "nama_masjid" tidak ditemukan di CSV. Pastikan kolom pertama berisi key dan kolom kedua value.');
        
        // Update seluruh halaman
        document.title = `${nama} | ${tagline || 'Masjid'}`;
        document.getElementById('hero-nama').innerText = nama;
        document.getElementById('hero-tagline').innerText = tagline;
        document.getElementById('hero-badge').innerText = nama.split(' ')[0];
        document.getElementById('visi-text').innerText = visi;
        document.getElementById('tahun-berdiri').innerHTML = tahun;
        document.getElementById('alamat-text').innerText = alamat;
        document.getElementById('footer-nama').innerText = nama;
        document.getElementById('footer-nama2').innerText = nama;
        document.getElementById('tahun-dinamis').innerText = new Date().getFullYear();
        
        // Misi (split berdasarkan baris baru, titik koma, atau titik)
        let misiItems = [];
        if (misiRaw) {
          misiItems = misiRaw.split(/\r?\n|;|\.\s/).filter(m => m.trim().length > 0);
        }
        const misiDiv = document.getElementById('misi-list');
        misiDiv.innerHTML = '';
        misiItems.forEach(m => {
          const p = document.createElement('p');
          p.className = 'flex items-start gap-2';
          p.innerHTML = `<i class="fas fa-check-circle text-emerald-600 mt-1 text-sm"></i><span>${escapeHtml(m.trim())}</span>`;
          misiDiv.appendChild(p);
        });
        
        // Fasilitas
        let fasItems = [];
        if (fasilitasRaw) {
          fasItems = fasilitasRaw.split(/\r?\n|\.\s(?=[A-Z])/).filter(f => f.trim().length > 0);
        }
        const fasGrid = document.getElementById('fasilitas-grid');
        fasGrid.innerHTML = '';
        fasItems.forEach(f => {
          const div = document.createElement('div');
          div.className = 'fasilitas-item';
          div.innerText = f.trim().replace(/^[•\-*]\s*/, '');
          fasGrid.appendChild(div);
        });
        
        // WhatsApp
        if (wa) {
          const cleanWa = wa.replace(/\D/g, '');
          const waUrl = `https://wa.me/${cleanWa.startsWith('62') ? cleanWa : '62' + cleanWa}`;
          document.getElementById('wa-link').href = waUrl;
          document.getElementById('wa-hero').href = waUrl;
          let displayWa = wa;
          if (!wa.startsWith('+')) displayWa = wa.startsWith('62') ? `+${wa}` : `+62${wa}`;
          document.getElementById('wa-link').innerText = displayWa;
        }
        
        // Email
        if (email) {
          document.getElementById('email-link').href = `mailto:${email}`;
          document.getElementById('email-link').innerText = email;
        }
        
        // Maps
        if (alamat) {
          document.getElementById('maps-link').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(alamat)}`;
        }
        
        // Tampilkan konten
        document.getElementById('loading').style.display = 'none';
        const main = document.getElementById('main');
        main.classList.remove('hidden');
        setTimeout(() => main.style.opacity = '1', 50);
        
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = `
          <div class="bg-red-50 border-l-4 border-red-500 p-6 max-w-md mx-auto text-center">
            <i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-3"></i>
            <p class="font-bold text-red-700">Gagal mengambil data dari Google Sheet</p>
            <p class="text-gray-600 mt-2">Pastikan URL CSV benar dan sheet sudah dipublikasikan.</p>
            <p class="text-xs text-gray-500 mt-2">Detail: ${err.message}</p>
            <button onclick="location.reload()" class="mt-4 bg-red-600 text-white px-4 py-2 rounded-full"><i class="fas fa-sync-alt mr-2"></i>Refresh</button>
          </div>
        `;
      }
    }
    
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    loadData();
  </script>
</body>
</html>
