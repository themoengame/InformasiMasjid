<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Masjid - Google Sheet (JSON)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8faf4; color: #1e2a2e; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        header { background: linear-gradient(135deg, #0f3b2c, #1e6f4c); color: white; padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 1.6rem; }
        .nav-links { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; }
        .hero { padding: 80px 20px; text-align: center; color: white; background-size: cover; background-position: center; }
        .hero h2 { font-size: 2.8rem; margin-bottom: 16px; }
        section { padding: 60px 0; border-bottom: 1px solid #e2e8e0; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 40px; text-align: center; color: #1e6f4c; }
        .section-title:after { content: ''; display: block; width: 70px; height: 4px; background: #f4c542; margin: 12px auto 0; }
        .grid-2, .grid-3, .grid-4 { display: grid; gap: 30px; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .card { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .schedule-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        .schedule-table th, .schedule-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e9ecef; }
        .schedule-table th { background-color: #1e6f4c; color: white; }
        .gallery-img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 8px; }
        .wa-link { background: #25D366; color: white; padding: 10px 20px; border-radius: 40px; display: inline-flex; align-items: center; gap: 10px; text-decoration: none; font-weight: bold; }
        .error-msg { background: #ffe0e0; color: #c00; padding: 20px; border-radius: 16px; margin: 20px; text-align: center; }
        .loading { text-align: center; padding: 50px; }
        @media (max-width: 768px) { .hero h2 { font-size: 2rem; } .nav-container { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<header>
    <div class="container nav-container">
        <div class="logo">
            <h1 id="namaMasjidHeader"><i class="fas fa-mosque"></i> Memuat...</h1>
            <p id="taglineHeader"></p>
        </div>
        <div class="nav-links">
            <a href="#profil">Profil</a><a href="#jadwal">Jadwal</a><a href="#imam">Imam</a>
            <a href="#kajian">Kajian</a><a href="#galeri">Galeri</a><a href="#pengurus">Pengurus</a>
            <a href="#keuangan">Keuangan</a><a href="#lokasi">Lokasi</a>
        </div>
    </div>
</header>

<div id="hero-container" class="hero" style="background: linear-gradient(rgba(15,59,44,0.85), rgba(30,111,76,0.85)), url('https://placehold.co/1600x600') center/cover;">
    <div class="container"><h2 id="heroJudul">Memuat...</h2><p id="heroSubjudul"></p></div>
</div>

<main class="container" id="main-content">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Mengambil data dari Google Sheet...</div>
</main>

<footer style="background:#0f3b2c; color:#ccc; padding:32px 0; text-align:center;">
    <div class="container"><p id="footerText"></p></div>
</footer>

<script>
const SPREADSHEET_ID = '1dKHiVnVhCBziOeAh_rabPfaaL8mpgtiPYmft2OxVGYQ';

// Ambil data dalam format JSON (lebih stabil)
async function fetchSheetJSON(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    const response = await fetch(url);
    const text = await response.text();
    // Hapus prefix )]}',\n yang ada di awal response
    const jsonText = text.substring(text.indexOf('{'));
    const json = JSON.parse(jsonText);
    const rows = json.table.rows;
    if (!rows || rows.length === 0) return [];
    const headers = rows[0].c.map(cell => cell ? cell.v : '');
    const data = [];
    for (let i = 1; i < rows.length; i++) {
        const row = rows[i].c;
        const obj = {};
        headers.forEach((h, idx) => {
            obj[h] = (row && row[idx] && row[idx].v !== null) ? row[idx].v : '';
        });
        data.push(obj);
    }
    return data;
}

async function fetchProfil() {
    const data = await fetchSheetJSON('profil');
    console.log('Profil JSON:', data);
    if (data.length === 0) throw new Error('Sheet profil kosong');
    const profil = {};
    data.forEach(row => {
        if (row.key && row.value !== undefined) {
            profil[row.key.trim()] = row.value.trim();
        }
    });
    if (Object.keys(profil).length === 0) throw new Error('Tidak ada data key-value di sheet profil (pastikan kolom bernama "key" dan "value")');
    return profil;
}

async function loadAllData() {
    try {
        const profil = await fetchProfil();
        const jadwalSholat = await fetchSheetJSON('jadwal_sholat');
        const jadwalImam = await fetchSheetJSON('jadwal_imam');
        const jadwalMuadzin = await fetchSheetJSON('jadwal_muadzin');
        const kajian = await fetchSheetJSON('kajian');
        const pengurus = await fetchSheetJSON('pengurus');
        const keuangan = await fetchSheetJSON('keuangan');
        const galeri = await fetchSheetJSON('galeri');
        const hero = await fetchSheetJSON('hero');
        const sosialMedia = await fetchSheetJSON('sosial_media');

        const namaMasjid = profil.nama_masjid || 'Masjid An-Nur';
        const tagline = profil.tagline || '';
        document.getElementById('namaMasjidHeader').innerHTML = `<i class="fas fa-mosque"></i> ${escapeHtml(namaMasjid)}`;
        document.getElementById('taglineHeader').innerText = escapeHtml(tagline);
        document.getElementById('footerText').innerHTML = `© 2025 ${escapeHtml(namaMasjid)} | Data dari Google Sheet`;

        const heroData = hero[0] || {};
        document.getElementById('heroJudul').innerText = escapeHtml(heroData.judul || namaMasjid);
        document.getElementById('heroSubjudul').innerText = escapeHtml(heroData.subjudul || tagline);
        if (heroData.background_url) {
            document.getElementById('hero-container').style.backgroundImage = `linear-gradient(rgba(15,59,44,0.85), rgba(30,111,76,0.85)), url('${escapeHtml(heroData.background_url)}')`;
        }

        const fasilitasRaw = profil.fasilitas || '';
        const fasilitasList = fasilitasRaw.split(/\r?\n/).filter(f => f.trim());
        const fasilitasHtml = fasilitasList.length ? `<ul>${fasilitasList.map(f => `<li>${escapeHtml(f)}</li>`).join('')}</ul>` : '<p>-</p>';

        let waNumber = (profil.wa_number || '').toString().replace(/[^0-9]/g, '');
        if (waNumber.startsWith('0')) waNumber = '62' + waNumber.substring(1);
        const waLink = waNumber ? `https://wa.me/${waNumber}` : '#';

        const html = `
            <section id="profil">
                <h3 class="section-title">Profil Masjid</h3>
                <div class="grid-2">
                    <div class="card">
                        <i class="fas fa-history fa-2x" style="color:#1e6f4c;"></i>
                        <h3>Tahun Berdiri</h3>
                        <p>${escapeHtml(profil.tahun_berdiri || '-')}</p>
                        <h3>Visi</h3>
                        <p>${escapeHtml(profil.visi || '').replace(/\n/g, '<br>')}</p>
                        <h3>Misi</h3>
                        <p>${escapeHtml(profil.misi || '').replace(/\n/g, '<br>')}</p>
                    </div>
                    <div class="card">
                        <i class="fas fa-building fa-2x" style="color:#1e6f4c;"></i>
                        <h3>Fasilitas</h3>
                        ${fasilitasHtml}
                    </div>
                </div>
            </section>

            <section id="jadwal">
                <h3 class="section-title">Jadwal Sholat</h3>
                <div class="card">
                    <table class="schedule-table">
                        <thead><tr><th>Sholat</th><th>Waktu</th></tr></thead>
                        <tbody>${jadwalSholat.map(row => `<tr><td>${escapeHtml(row.sholat)}</td><td>${escapeHtml(row.waktu)}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            </section>

            <section id="imam">
                <h3 class="section-title">Imam & Muadzin</h3>
                <div class="grid-2">
                    <div class="card"><h3>Imam</h3><ul>${jadwalImam.map(i => `<li><strong>${escapeHtml(i.sholat)}</strong> : ${escapeHtml(i.nama_imam)}</li>`).join('')}</ul></div>
                    <div class="card"><h3>Muadzin</h3><ul>${jadwalMuadzin.map(m => `<li><strong>${escapeHtml(m.sholat)}</strong> : ${escapeHtml(m.nama_muadzin)}</li>`).join('')}</ul></div>
                </div>
            </section>

            <section id="kajian">
                <h3 class="section-title">Kajian Rutin</h3>
                <div class="grid-3">${kajian.map(k => `
                    <div class="card">
                        <i class="fas ${k.icon || 'fa-calendar-alt'} fa-2x"></i>
                        <h3>${escapeHtml(k.judul)}</h3>
                        <p>${escapeHtml(k.deskripsi)}</p>
                        <a href="${escapeHtml(k.link)}" target="_blank" style="background:#f4c542; padding:8px 16px; border-radius:40px; text-decoration:none; display:inline-block; margin-top:12px;">Detail →</a>
                    </div>`).join('')}
                </div>
            </section>

            <section id="galeri">
                <h3 class="section-title">Galeri</h3>
                <div class="grid-4">${galeri.map(g => `
                    <div><img src="${escapeHtml(g.url_gambar)}" class="gallery-img" loading="lazy"><p>${escapeHtml(g.judul)}</p></div>`).join('')}
                </div>
            </section>

            <section id="pengurus">
                <h3 class="section-title">Pengurus</h3>
                <div class="grid-3">${pengurus.map(p => `
                    <div class="card" style="text-align:center">
                        ${p.foto_url ? `<img src="${escapeHtml(p.foto_url)}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;">` : '<i class="fas fa-user-circle fa-3x"></i>'}
                        <h3>${escapeHtml(p.jabatan)}</h3>
                        <p>${escapeHtml(p.nama)}</p>
                    </div>`).join('')}
                </div>
            </section>

            <section id="keuangan">
                <h3 class="section-title">Keuangan</h3>
                <div class="card">${keuangan.map(k => `
                    <div><strong>${escapeHtml(k.bulan_tahun)}</strong></div>
                    <div>Pemasukan: Rp ${parseInt(k.pemasukan).toLocaleString()}</div>
                    <div>Pengeluaran: Rp ${parseInt(k.pengeluaran).toLocaleString()}</div>
                    <div><strong>Saldo: Rp ${parseInt(k.saldo).toLocaleString()}</strong></div>
                `).join('')}</div>
            </section>

            <section id="lokasi">
                <h3 class="section-title">Lokasi & Kontak</h3>
                <div class="grid-2">
                    <div><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.712359129087!2d107.618889!3d-6.917222!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2e68e7a3e5b5b3b3%3A0x5e5e5e5e5e5e5e5e!2sMasjid%20Raya!5e0!3m2!1sid!2sid!4v1680000000000!5m2!1sid!2sid" width="100%" height="300" style="border:0;" allowfullscreen></iframe></div>
                    <div class="card">
                        <h3>Hubungi Kami</h3>
                        ${waNumber ? `<p><i class="fab fa-whatsapp"></i> <a href="${waLink}" target="_blank" class="wa-link">Chat Marbot</a></p>` : ''}
                        <p><i class="fas fa-envelope"></i> ${escapeHtml(profil.email || '-')}</p>
                        <p><i class="fas fa-map-marker-alt"></i> ${escapeHtml(profil.alamat || '-')}</p>
                        <div>${sosialMedia.map(sm => `<a href="${escapeHtml(sm.url)}" target="_blank" style="margin-right:16px; font-size:1.8rem; color:#1e6f4c;"><i class="fab fa-${sm.platform}"></i></a>`).join('')}</div>
                    </div>
                </div>
            </section>
        `;
        document.getElementById('main-content').innerHTML = html;
    } catch (err) {
        console.error(err);
        document.getElementById('main-content').innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> Error: ${err.message}<br><br>Pastikan semua sheet sudah dipublikasikan ke web (File → Share → Publish to web → pilih sheet → format "Web page" (JSON) atau "CSV"). Untuk hasil terbaik, publish ulang semua sheet.</div>`;
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

loadAllData();
</script>
</body>
</html>
