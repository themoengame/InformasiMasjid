<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Masjid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-emerald-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 id="nav-title" class="text-xl font-bold">Memuat...</h1>
            <div id="contact-icons" class="space-x-4">
                <a id="wa-link" href="#" target="_blank" class="hover:text-emerald-300"><i class="fab fa-whatsapp"></i></a>
                <a id="email-link" href="#" class="hover:text-emerald-300"><i class="far fa-envelope"></i></a>
            </div>
        </div>
    </nav>

    <header class="bg-emerald-700 text-white py-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h2 id="hero-name" class="text-5xl font-extrabold mb-4 uppercase"></h2>
            <p id="hero-tagline" class="text-2xl font-light italic opacity-80"></p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 -mt-10">
        <div class="grid md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <section class="bg-white p-8 rounded-2xl shadow-sm border-l-8 border-emerald-600">
                    <h3 class="text-emerald-800 font-bold text-xl mb-3"><i class="fas fa-eye mr-2"></i> VISI</h3>
                    <p id="data-visi" class="text-lg italic text-slate-600"></p>
                </section>

                <section class="bg-white p-8 rounded-2xl shadow-sm border-l-8 border-emerald-600">
                    <h3 class="text-emerald-800 font-bold text-xl mb-3"><i class="fas fa-tasks mr-2"></i> MISI</h3>
                    <div id="data-misi" class="whitespace-pre-line leading-relaxed"></div>
                </section>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold text-emerald-800 border-b pb-2 mb-4">Informasi Masjid</h3>
                    <ul class="space-y-4 text-sm">
                        <li>
                            <span class="block text-slate-400 uppercase text-xs">Tahun Berdiri</span>
                            <span id="data-tahun" class="font-semibold text-emerald-700"></span>
                        </li>
                        <li>
                            <span class="block text-slate-400 uppercase text-xs">Alamat</span>
                            <span id="data-alamat"></span>
                        </li>
                    </ul>
                </div>

                <div class="bg-emerald-50 p-6 rounded-2xl border border-emerald-100">
                    <h3 class="font-bold text-emerald-800 mb-3">Fasilitas</h3>
                    <div id="data-fasilitas" class="text-sm whitespace-pre-line italic text-slate-600"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // GANTI URL INI dengan link CSV dari "Publish to the Web" Anda
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5q7x-S-zZ-p_y_0Q_fP7F5v7_V7F_u_X_J8v_y_Z_p_y_0Q/pub?output=csv';

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // Parsing CSV sederhana (mengubah teks CSV menjadi Object)
                const rows = data.split('\n');
                const profile = {};
                
                rows.forEach(row => {
                    // Menggunakan regex untuk menangani koma di dalam tanda kutip jika ada
                    const parts = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (parts.length >= 2) {
                        let key = parts[0].trim();
                        let value = parts[1].replace(/^"|"$/g, '').trim(); // Hapus tanda kutip jika ada
                        profile[key] = value;
                    }
                });

                // Mapping Data ke HTML
                document.getElementById('nav-title').innerText = profile.nama_masjid;
                document.getElementById('hero-name').innerText = profile.nama_masjid;
                document.getElementById('hero-tagline').innerText = profile.tagline;
                document.getElementById('data-visi').innerText = profile.visi;
                document.getElementById('data-misi').innerText = profile.misi;
                document.getElementById('data-tahun').innerText = profile.tahun_berdiri;
                document.getElementById('data-alamat').innerText = profile.alamat;
                document.getElementById('data-fasilitas').innerText = profile.fasilitas;
                
                document.getElementById('wa-link').href = `https://wa.me/${profile.wa_number}`;
                document.getElementById('email-link').href = `mailto:${profile.email}`;

            } catch (error) {
                console.error('Gagal memuat data:', error);
                document.getElementById('nav-title').innerText = "Gagal Memuat Data";
            }
        }

        loadData();
    </script>
</body>
</html>
